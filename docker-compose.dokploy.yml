# OpenWA - Docker Compose per Dokploy
# =============================================================================
# Stack: openwa-api (NestJS) + dashboard (nginx, reverse-proxy interno) + PostgreSQL
#
# Dokploy fornisce GIA' il proprio Traefik con SSL Let's Encrypt automatico, quindi:
#   - NON includiamo un Traefik qui dentro
#   - NON pubblichiamo porte sull'host (niente "ports:")
#   - Il dominio pubblico va assegnato al servizio "dashboard" dalla UI "Domains"
#     di Dokploy (Service Name: dashboard, Port: 80). La dashboard (nginx) fa da
#     reverse-proxy interno verso openwa-api per le rotte /api/ e /socket.io/
#     (WebSocket), quindi un solo dominio basta per tutto.
#
# Variabili richieste (impostale nella sezione "Environment" del progetto Dokploy):
#   DOMAIN              ->  es. wa.miodominio.com  (senza https://)
#   API_MASTER_KEY      ->  chiave admin dell'API (stringa lunga e casuale)
#   DATABASE_PASSWORD   ->  password del database PostgreSQL
# =============================================================================

services:
  # ===== Backend API (NestJS + whatsapp-web.js / Chromium) =====
  openwa-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Chromium/Puppeteer e' piu' stabile con /dev/shm ampio
    shm_size: '1gb'
    expose:
      - '2785'
    environment:
      - NODE_ENV=production
      - PORT=2785
      - LOG_LEVEL=info
      - BASE_URL=https://${DOMAIN}
      - DASHBOARD_URL=https://${DOMAIN}
      - CORS_ORIGINS=https://${DOMAIN}
      # --- Database "data" (session/webhook/message) su PostgreSQL ---
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=openwa
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_SYNCHRONIZE=false   # le migration Postgres girano in automatico all'avvio
      # NB: il database "main" (API key + audit log) resta SEMPRE SQLite in /app/data,
      #     percio' il volume persistente sotto e' obbligatorio anche con Postgres.
      # --- Engine WhatsApp ---
      - ENGINE_TYPE=whatsapp-web.js
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      # --- Storage media su filesystem (volume persistente) ---
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      # --- Plugin ---
      - PLUGINS_ENABLED=true
      - PLUGINS_DIR=/app/data/plugins
      # --- Sicurezza ---
      - API_MASTER_KEY=${API_MASTER_KEY}
    volumes:
      - openwa-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - openwa-internal
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===== Dashboard (SPA nginx + reverse-proxy interno verso l'API) =====
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.traefik
    restart: unless-stopped
    depends_on:
      - openwa-api
    networks:
      - openwa-internal
      - dokploy-network
    # Routing gestito via label Traefik: per un Compose multi-servizio la UI
    # "Domains" di Dokploy non permette di scegliere il container target, quindi
    # esponiamo esplicitamente QUESTO servizio (dashboard:80). Imposta DOMAIN
    # nelle Environment del progetto. NON aggiungere lo stesso host dalla UI
    # Domains: creerebbe un secondo router Traefik in conflitto.
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # HTTPS (entrypoint websecure) + certificato Let's Encrypt
      - traefik.http.routers.openwa.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.openwa.entrypoints=websecure
      - traefik.http.routers.openwa.tls.certresolver=letsencrypt
      - traefik.http.services.openwa.loadbalancer.server.port=80
      # Redirect HTTP -> HTTPS
      - traefik.http.routers.openwa-web.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.openwa-web.entrypoints=web
      - traefik.http.routers.openwa-web.middlewares=openwa-https
      - traefik.http.middlewares.openwa-https.redirectscheme.scheme=https

  # ===== PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openwa
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: openwa     # il codice usa il nome DB fisso "openwa": NON cambiarlo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - openwa-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U openwa']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  openwa-data:
  postgres-data:

networks:
  openwa-internal:
  # Rete condivisa con il Traefik di Dokploy: deve gia' esistere (la crea Dokploy)
  dokploy-network:
    external: true
